<body>
    <div class="wrap">
        <h1>风弹数量计算器</h1>

        <!-- 斜向计算 -->
        <div class="card">
            <h2>斜向 / 任意方向</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>起点 X</label>
                    <input type="number" id="x0" step="0.1" value="-34.0">
                </div>
                <div class="form-group">
                    <label>起点 Z</label>
                    <input type="number" id="z0" step="0.1" value="6.0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>目标 X</label>
                    <input type="number" id="targetX_slant" step="0.1" value="-100">
                </div>
                <div class="form-group">
                    <label>目标 Z</label>
                    <input type="number" id="targetZ" step="0.1" value="150">
                </div>
            </div>
            <button onclick="calcSlant()">计算</button>
            <div id="resSlant" class="result">
                <div>水平距离: <span id="distSlant"></span> 格</div>
                <div class="num" id="numSlant"></div>
                <div class="detail" id="explainSlant"></div>
            </div>
            <div class="hint">
                根据实测：3 个风弹约 90.7 格，之后每增加 1 个风弹约多飞 40.8 格。
            </div>
        </div>

        <!-- 直线计算 -->
        <div class="card">
            <h2>直线超远距离</h2>
            <div class="form-row">
                <div class="form-group full">
                    <label>目标落点 X 坐标</label>
                    <input type="number" id="targetX_line" step="0.01" value="2478">
                </div>
                <div class="form-group">
                    <label>算法</label>
                    <select id="method">
                        <option value="auto">自动</option>
                        <option value="interp">插值</option>
                        <option value="power">幂律</option>
                    </select>
                </div>
            </div>
            <button onclick="calcLine()">计算</button>
            <div id="resLine" class="result">
                <div>精确值: <span id="preciseLine"></span></div>
                <div class="num" id="numLine"></div>
                <div class="detail" id="methodLine"></div>
            </div>
            <div class="hint">
                实测数据点：119.94→4, 267→5, 346.51→6, 428.54→7, 496→8, 679→10, 1183→16, 2478→32。
                远距离采用幂律 n = 0.1936 × x^0.686，近距离使用线性插值。
            </div>
        </div>

        <footer>
            Minecraft 风弹珍珠炮辅助工具
        </footer>
    </div>

    <script>
        // ==================== 斜向计算 ====================
        function calcWindCharges(x0, z0, X, Z) {
            const Dh = Math.sqrt(Math.pow(X - x0, 2) + Math.pow(Z - z0, 2));
            if (Dh < 131.54) return 3;
            if (Dh < 172.34) return 4;
            return 5 + Math.ceil((Dh - 172.34) / 40.8);
        }

        function calcSlant() {
            const x0 = parseFloat(document.getElementById('x0').value);
            const z0 = parseFloat(document.getElementById('z0').value);
            const tx = parseFloat(document.getElementById('targetX_slant').value);
            const tz = parseFloat(document.getElementById('targetZ').value);
            if ([x0,z0,tx,tz].some(isNaN)) { alert("请输入有效数字"); return; }

            const Dh = Math.sqrt(Math.pow(tx - x0, 2) + Math.pow(tz - z0, 2));
            const n = calcWindCharges(x0, z0, tx, tz);

            document.getElementById('distSlant').textContent = Dh.toFixed(2);
            document.getElementById('numSlant').textContent = n + " 个风弹";

            let explain = "";
            if (n === 3) explain = "基础配置（3 个）";
            else if (n === 4) explain = "中等距离";
            else if (n === 5) explain = "较远距离";
            else explain = "超远距离（外推值，可能有误差）";
            document.getElementById('explainSlant').textContent = explain;

            document.getElementById('resSlant').classList.add('show');
        }

        // ==================== 直线计算 ====================
        const xData = [119.94, 267.00, 346.51, 428.54, 496.00, 679.00, 1183.00, 2478.00];
        const nData = [4, 5, 6, 7, 8, 10, 16, 32];
        const A_FIT = 0.1936, B_FIT = 0.686;

        function powerLaw(x) { return A_FIT * Math.pow(x, B_FIT); }

        function linearInterp(x) {
            const xs = xData.slice().sort((a,b)=>a-b);
            const ns = xs.map(v => nData[xData.indexOf(v)]);
            if (x <= xs[0]) return ns[0];
            if (x >= xs[xs.length-1]) return ns[ns.length-1];
            for (let i=0; i<xs.length-1; i++) {
                if (x >= xs[i] && x <= xs[i+1]) {
                    return ns[i] + (x - xs[i]) * (ns[i+1] - ns[i]) / (xs[i+1] - xs[i]);
                }
            }
            return ns[0];
        }

        function windChargesNeeded(targetX, method) {
            if (method === 'auto') method = targetX <= 1200 ? 'interp' : 'power';
            if (method === 'interp') {
                const v = linearInterp(targetX);
                if (targetX < Math.min(...xData) || targetX > Math.max(...xData)) return powerLaw(targetX);
                return v;
            }
            return powerLaw(targetX);
        }

        function calcLine() {
            const tx = parseFloat(document.getElementById('targetX_line').value);
            const method = document.getElementById('method').value;
            if (isNaN(tx)) { alert("请输入有效数字"); return; }

            const n = windChargesNeeded(tx, method);
            const methodReal = method === 'auto' ? (tx <= 1200 ? 'interp' : 'power') : method;
            const methodName = methodReal === 'interp' ? '插值法' : '幂律拟合';

            document.getElementById('preciseLine').textContent = n.toFixed(2);
            document.getElementById('numLine').textContent = Math.round(n) + " 个风弹";
            document.getElementById('methodLine').textContent = "使用算法：" + methodName;
            document.getElementById('resLine').classList.add('show');
        }

        // 页面加载后自动计算示例
        window.onload = function() {
            calcSlant();
            calcLine();
        };
    </script>
</body>
